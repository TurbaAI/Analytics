apiVersion: v1
kind: Secret
metadata:
  name: turbalance-ingestion-secrets
  labels:
    app.kubernetes.io/name: turbalance-ingestion
type: Opaque
stringData:
  tenant-tokens: "tenant-a:replace-me:operator:pilot-operator,admin:replace-me:admin:platform-admin"
  upload-secret: "replace-with-random-hmac-secret"
  jwt-secret: "replace-or-remove-when-using-rs256-jwks"
  metrics-token: "replace-with-viewer-token"
  exporter-token: "replace-with-ingest-token"
