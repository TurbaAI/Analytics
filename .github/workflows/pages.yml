name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run full suite
        run: node tests/run-all.js

      - name: Validate source bundles
        run: node scripts/validate-source-bundle.js --require-source-export

      - name: Run screenshot QA when browser automation is available
        run: node scripts/run-screenshot-qa.js

      - name: Assemble static site
        run: |
          mkdir -p site
          cp index.html styles.css app.js app-data.js app-core.js app-pipeline.js app-state.js app-render.js analytics-core.js predictive-core.js nccl-trace-parser.js nccl-trace-fixtures.js site/
          cp -R assets build fixtures docs schemas scripts grafana lib ops server site/
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
