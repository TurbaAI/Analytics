name: Provider Ingestion Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Provider-approved image tag"
        required: false
        default: ""
      config:
        description: "Pilot provider config path"
        required: false
        default: "ops/pilot-provider.config.example.json"
      push:
        description: "Push image"
        required: true
        default: "false"

jobs:
  build-provider-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build or publish provider image
        env:
          PROVIDER_CONFIG: ${{ inputs.config }}
          PROVIDER_IMAGE: ${{ inputs.image }}
          PUSH_IMAGE: ${{ inputs.push }}
        run: |
          ARGS=(--config "$PROVIDER_CONFIG")
          if [ -n "$PROVIDER_IMAGE" ]; then
            ARGS+=(--image "$PROVIDER_IMAGE")
          fi
          if [ "$PUSH_IMAGE" = "true" ]; then
            ARGS+=(--push)
          else
            ARGS+=(--dry-run)
          fi
          node scripts/build-publish-ingestion-image.js "${ARGS[@]}"
