apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: turbalance-lakehouse
  labels: { app: otel-collector, app.kubernetes.io/part-of: turbalance-lakehouse }
data:
  config.yaml: |-
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: turbalance-collector-gateway
              scrape_interval: 30s
              metrics_path: /metrics
              static_configs:
                - targets: ["collector-gateway.turbalance-lakehouse.svc.cluster.local:8801"]
            - job_name: turbalance-api-server
              scrape_interval: 30s
              metrics_path: /metrics
              static_configs:
                - targets: ["api-server.turbalance-lakehouse.svc.cluster.local:8080"]
            - job_name: turbalance-duckdb-query-service
              scrape_interval: 30s
              metrics_path: /metrics
              static_configs:
                - targets: ["duckdb-query-service.turbalance-lakehouse.svc.cluster.local:8802"]
            - job_name: turbalance-discovery-api
              scrape_interval: 30s
              metrics_path: /metrics
              static_configs:
                - targets: ["discovery-api.turbalance-lakehouse.svc.cluster.local:8803"]
            - job_name: turbalance-queue-gateway
              scrape_interval: 30s
              metrics_path: /metrics
              static_configs:
                - targets: ["queue-gateway.turbalance-lakehouse.svc.cluster.local:8804"]

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      batch:
        timeout: 5s

    exporters:
      debug:
        verbosity: basic
      prometheus:
        endpoint: 0.0.0.0:9464

    service:
      extensions: [health_check]
      telemetry:
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters: [prometheus, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: turbalance-lakehouse
  labels: { app: otel-collector, app.kubernetes.io/part-of: turbalance-lakehouse }
spec:
  replicas: 1
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector, app.kubernetes.io/part-of: turbalance-lakehouse }
    spec:
      serviceAccountName: turbalance-platform
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, runAsUser: 65532, runAsGroup: 65532 }
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.111.0
          imagePullPolicy: IfNotPresent
          args: ["--config=/etc/otelcol-contrib/config.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: metrics, containerPort: 9464 }
            - { name: internal, containerPort: 8888 }
            - { name: health, containerPort: 13133 }
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol-contrib/config.yaml, subPath: config.yaml, readOnly: true }
            - { name: otel-storage, mountPath: /var/lib/otelcol }
          readinessProbe:
            httpGet: { path: /, port: health }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: health }
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap: { name: otel-collector-config }
        - name: otel-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: turbalance-lakehouse
  labels: { app: otel-collector, app.kubernetes.io/part-of: turbalance-lakehouse }
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc }
    - { name: otlp-http, port: 4318, targetPort: otlp-http }
    - { name: metrics, port: 9464, targetPort: metrics }
    - { name: internal, port: 8888, targetPort: internal }
    - { name: health, port: 13133, targetPort: health }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: turbalance-lakehouse-otel-collector
  namespace: turbalance-lakehouse
  labels: { app.kubernetes.io/part-of: turbalance-lakehouse }
spec:
  selector:
    matchLabels: { app: otel-collector }
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
