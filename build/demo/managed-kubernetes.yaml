apiVersion: v1
kind: Namespace
metadata:
  name: turbalance-sandbox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: turbalance-ingestion
  namespace: turbalance-sandbox
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::210987654321:role/turbalance-sandbox-ingestion-secrets
  labels:
    app.kubernetes.io/name: turbalance-ingestion
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: turbalance-sandbox-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: turbalance-ingestion
            namespace: turbalance-sandbox
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: turbalance-ingestion-config
  namespace: turbalance-sandbox
  labels:
    app.kubernetes.io/name: turbalance-ingestion
data:
  TURBALANCE_STORAGE_MODE: managed-postgres-s3
  TURBALANCE_OBJECT_BUCKET: turbalance-sandbox-ai-ops-ingestion
  TURBALANCE_OBJECT_PREFIX: sandbox/provider-a
  TURBALANCE_RETENTION_DAYS: "30"
  TURBALANCE_MAX_UPLOADS_PER_TENANT: "500"
  TURBALANCE_MAX_UPLOAD_BYTES: "26214400"
  TURBALANCE_JWT_AUDIENCE: turbalance-ingestion
  TURBALANCE_JWT_TENANT_CLAIM: customer_tenant
  TURBALANCE_JWT_ROLE_CLAIM: groups
  TURBALANCE_JWT_ROLE_MAP: security-reader:viewer,platform-operator:operator
  TURBALANCE_CORS_ORIGIN: "*"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: turbalance-ingestion-secrets
  namespace: turbalance-sandbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: turbalance-sandbox-secret-store
    kind: ClusterSecretStore
  target:
    name: turbalance-ingestion-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres-url
      remoteRef:
        key: turbalance/sandbox/provider-a/postgres-url
    - secretKey: tenant-tokens
      remoteRef:
        key: turbalance/sandbox/provider-a/tenant-tokens
    - secretKey: upload-secret
      remoteRef:
        key: turbalance/sandbox/provider-a/upload-secret
    - secretKey: exporter-token
      remoteRef:
        key: turbalance/sandbox/provider-a/exporter-token
    - secretKey: jwt-secret
      remoteRef:
        key: turbalance/sandbox/provider-a/jwt-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turbalance-sandbox-ingestion
  namespace: turbalance-sandbox
  labels:
    app.kubernetes.io/name: turbalance-ingestion
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: turbalance-ingestion
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: turbalance-ingestion
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: turbalance-ingestion
      containers:
        - name: ingestion
          image: 127.0.0.1:5000/turbalance-ingestion:2026.06
          imagePullPolicy: IfNotPresent
          command: ["node", "server/ingestion-server.js"]
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: TURBALANCE_INGEST_HOST
              value: 0.0.0.0
            - name: TURBALANCE_POSTGRES_URL_FILE
              value: /var/run/turbalance-secrets/postgres-url
            - name: TURBALANCE_TENANT_TOKENS_FILE
              value: /var/run/turbalance-secrets/tenant-tokens
            - name: TURBALANCE_UPLOAD_SECRET_FILE
              value: /var/run/turbalance-secrets/upload-secret
            - name: TURBALANCE_JWT_SECRET_FILE
              value: /var/run/turbalance-secrets/jwt-secret
          envFrom:
            - configMapRef:
                name: turbalance-ingestion-config
          volumeMounts:
            - name: secrets
              mountPath: /var/run/turbalance-secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
      volumes:
        - name: secrets
          secret:
            secretName: turbalance-ingestion-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: turbalance-sandbox-ingestion
  namespace: turbalance-sandbox
  labels:
    app.kubernetes.io/name: turbalance-ingestion
spec:
  selector:
    app.kubernetes.io/name: turbalance-ingestion
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8787
      targetPort: http
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: turbalance-sandbox-provider-export
  namespace: turbalance-sandbox
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: turbalance-ingestion
          restartPolicy: Never
          containers:
            - name: exporter
              image: 127.0.0.1:5000/turbalance-ingestion:2026.06
              command: ["node", "scripts/run-provider-pilot-export-job.js"]
              env:
                - name: TURBALANCE_EXPORT_INPUT_DIR
                  value: /var/run/turbalance-provider-exports
                - name: TURBALANCE_INGEST_URL
                  value: http://turbalance-sandbox-ingestion:8787/v1/ingestion
                - name: TURBALANCE_INGEST_TENANT
                  value: provider-a
                - name: TURBALANCE_INGEST_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: turbalance-ingestion-secrets
                      key: exporter-token
              volumeMounts:
                - name: provider-exports
                  mountPath: /var/run/turbalance-provider-exports
                  readOnly: true
          volumes:
            - name: provider-exports
              emptyDir: {}
