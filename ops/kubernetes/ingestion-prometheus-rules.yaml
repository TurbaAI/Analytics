apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: turbalance-ingestion
  labels:
    app.kubernetes.io/name: turbalance-ingestion
spec:
  groups:
    - name: turbalance-ingestion.rules
      rules:
        - alert: TurbalanceIngestionRejectingPayloads
          expr: increase(turbalance_ingest_rejected_total[15m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: turbalance ingestion rejected source bundles
            description: Source-bundle validation or JSON parsing rejected one or more uploads in the last 15 minutes.
        - alert: TurbalanceIngestionAuthFailuresHigh
          expr: increase(turbalance_auth_failures_total[15m]) > 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: turbalance ingestion auth failures are elevated
            description: Bearer/JWT authentication failures exceeded the expected pilot baseline.
        - alert: TurbalanceJwksFetchFailing
          expr: increase(turbalance_jwks_fetch_failures_total[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: turbalance JWKS fetch is failing
            description: RS256/JWKS authentication cannot refresh keys. Check issuer availability and JWKS configuration.
        - alert: TurbalanceRetentionNotRunning
          expr: time() - turbalance_last_retention_run_unix_seconds > 93600
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: turbalance retention has not run recently
            description: Retention has not completed in more than 26 hours. Check the CronJob or in-process scheduler.
