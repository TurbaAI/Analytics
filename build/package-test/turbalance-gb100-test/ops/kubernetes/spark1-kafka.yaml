apiVersion: v1
kind: Namespace
metadata:
  name: turbalance-demo
  labels:
    app.kubernetes.io/name: turbalance-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark1-kafka
  namespace: turbalance-demo
  labels:
    app.kubernetes.io/name: spark1-kafka
    app.kubernetes.io/part-of: turbalance-spark1-demo
    turba.ai/demo: spark1-kafka
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: spark1-kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark1-kafka
        app.kubernetes.io/part-of: turbalance-spark1-demo
        turba.ai/demo: spark1-kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.3.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: kafka
              containerPort: 9092
            - name: external
              containerPort: 19092
            - name: controller
              containerPort: 29093
          env:
            - name: CLUSTER_ID
              value: 4L6g3nShT-eMCtK--X86sw
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:29093
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: CONTROLLER://:29093,PLAINTEXT://:9092,PLAINTEXT_HOST://:19092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://spark1-kafka.turbalance-demo.svc.cluster.local:9092,PLAINTEXT_HOST://192.168.10.20:30992
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_NUM_PARTITIONS
              value: "1"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "6"
            - name: KAFKA_HEAP_OPTS
              value: -Xms256m -Xmx512m
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: kafka
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          volumeMounts:
            - name: data
              mountPath: /tmp/kraft-combined-logs
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spark1-kafka
  namespace: turbalance-demo
  labels:
    app.kubernetes.io/name: spark1-kafka
    app.kubernetes.io/part-of: turbalance-spark1-demo
    turba.ai/demo: spark1-kafka
spec:
  selector:
    app.kubernetes.io/name: spark1-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: controller
      port: 29093
      targetPort: controller
---
apiVersion: v1
kind: Service
metadata:
  name: spark1-kafka-nodeport
  namespace: turbalance-demo
  labels:
    app.kubernetes.io/name: spark1-kafka
    app.kubernetes.io/part-of: turbalance-spark1-demo
    turba.ai/demo: spark1-kafka
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: spark1-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: external
      nodePort: 30992
