apiVersion: v1
kind: Namespace
metadata:
  name: turbalance-demo
  labels:
    app.kubernetes.io/name: turbalance-demo
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spark1-gpu-vectoradd
  namespace: turbalance-demo
  labels:
    app.kubernetes.io/name: spark1-gpu-vectoradd
    turba.ai/run-id: spark1-k8s-demo-001
    turba.ai/demo: spark1-kubernetes
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark1-gpu-vectoradd
        turba.ai/run-id: spark1-k8s-demo-001
        turba.ai/demo: spark1-kubernetes
    spec:
      restartPolicy: Never
      runtimeClassName: nvidia
      containers:
        - name: vectoradd
          image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              end_time=$(($(date +%s) + ${TURBALANCE_DEMO_SECONDS:-180}))
              while [ "$(date +%s)" -lt "$end_time" ]; do
                /cuda-samples/vectorAdd >/tmp/vectoradd.log
              done
              cat /tmp/vectoradd.log
          env:
            - name: TURBALANCE_DEMO_SECONDS
              value: "180"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
          resources:
            limits:
              nvidia.com/gpu: 1
