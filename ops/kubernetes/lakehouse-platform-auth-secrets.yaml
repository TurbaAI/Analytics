apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: turbalance-api-auth
  namespace: turbalance-lakehouse
  labels: { app.kubernetes.io/part-of: turbalance-lakehouse }
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: turbalance-provider-secrets
  target:
    name: turbalance-api-auth
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: api-tokens
      remoteRef:
        key: lakehouse/api-auth
        property: api-tokens
    - secretKey: jwks
      remoteRef:
        key: lakehouse/api-auth
        property: jwks
---
