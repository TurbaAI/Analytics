name: Visual QA

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - "assets/**"
      - "scripts/run-screenshot-qa.js"
      - ".github/workflows/visual-qa.yml"

jobs:
  screenshot-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run screenshot QA
        env:
          TURBALANCE_SCREENSHOT_QA_REQUIRED: "1"
        run: node scripts/run-screenshot-qa.js

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: turbalance-screenshot-qa
          path: build/qa/
