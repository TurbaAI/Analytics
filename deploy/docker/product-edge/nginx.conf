events {}

http {
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;

  server {
    listen 8443 ssl http2;
    ssl_certificate /etc/turbalance/tls/server.crt;
    ssl_certificate_key /etc/turbalance/tls/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /api/ {
      proxy_pass http://127.0.0.1:8080/;
    }

    location /collector/ {
      proxy_pass http://127.0.0.1:8801/;
    }

    location /grafana/ {
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://127.0.0.1:3001/;
    }

    location / {
      proxy_pass http://127.0.0.1:8000;
    }
  }

  server {
    listen 9443 ssl http2;
    ssl_certificate /etc/turbalance/tls/server.crt;
    ssl_certificate_key /etc/turbalance/tls/server.key;
    ssl_client_certificate /etc/turbalance/tls/client-ca.crt;
    ssl_verify_client on;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_set_header X-Forwarded-Client-Cert "URI=spiffe://turbalance.local/edge-client;Subject=\"$ssl_client_s_dn\";Hash=$ssl_client_fingerprint";
      proxy_pass http://127.0.0.1:8801;
    }
  }
}
