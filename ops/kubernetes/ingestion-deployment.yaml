apiVersion: apps/v1
kind: Deployment
metadata:
  name: turbalance-ingestion
  labels:
    app.kubernetes.io/name: turbalance-ingestion
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: turbalance-ingestion
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: turbalance-ingestion
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: turbalance-ingestion
      containers:
        - name: ingestion
          image: registry.provider.example/ai-ops/turbalance-ingestion:2026.06
          imagePullPolicy: IfNotPresent
          command: ["node", "server/ingestion-server.js"]
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: TURBALANCE_INGEST_HOST
              value: 0.0.0.0
            - name: TURBALANCE_POSTGRES_URL_FILE
              value: /var/run/turbalance-secrets/postgres-url
            - name: TURBALANCE_TENANT_TOKENS_FILE
              value: /var/run/turbalance-secrets/tenant-tokens
            - name: TURBALANCE_UPLOAD_SECRET_FILE
              value: /var/run/turbalance-secrets/upload-secret
            - name: TURBALANCE_JWT_SECRET_FILE
              value: /var/run/turbalance-secrets/jwt-secret
          envFrom:
            - configMapRef:
                name: turbalance-ingestion-config
          volumeMounts:
            - name: secrets
              mountPath: /var/run/turbalance-secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
      volumes:
        - name: secrets
          secret:
            secretName: turbalance-ingestion-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: turbalance-ingestion
  labels:
    app.kubernetes.io/name: turbalance-ingestion
spec:
  selector:
    app.kubernetes.io/name: turbalance-ingestion
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8787
      targetPort: http
