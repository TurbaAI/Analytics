syntax = "proto3";

package turba.telemetry.v1;

message TelemetryMetric {
  string name = 1;
  double value = 2;
  string unit = 3;
  string kind = 4;
  map<string, string> labels = 5;
}

message TelemetrySample {
  string sample_id = 1;
  string sensor_type = 2;
  string source = 3;
  string event_ts = 4;
  string run_id = 5;
  string node = 6;
  string namespace = 7;
  string pod_name = 8;
  string container_name = 9;
  map<string, string> labels = 10;
  repeated TelemetryMetric metrics = 11;
}

message TelemetryBatch {
  string schema_version = 1;
  string batch_id = 2;
  string tenant_id = 3;
  string host_id = 4;
  string agent_id = 5;
  uint64 sequence_no = 6;
  string trace_id = 7;
  string event_ts = 8;
  string ingest_ts = 9;
  repeated TelemetrySample samples = 10;
}

message WriteResultFile {
  string table_name = 1;
  string path = 2;
  uint64 row_count = 3;
  string tenant_id = 4;
  string dt = 5;
  string hour = 6;
}

message WriteTelemetryBatchResponse {
  string status = 1;
  string batch_id = 2;
  uint64 row_count = 3;
  uint64 file_count = 4;
  string manifest_path = 5;
  repeated WriteResultFile files = 6;
  string reason = 7;
}

message CollectorHealthRequest {}

message CollectorHealthResponse {
  string status = 1;
  string version = 2;
}

service TelemetryCollector {
  rpc WriteTelemetryBatch(TelemetryBatch) returns (WriteTelemetryBatchResponse);
  rpc Health(CollectorHealthRequest) returns (CollectorHealthResponse);
}
