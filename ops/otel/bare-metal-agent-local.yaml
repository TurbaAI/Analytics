extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  hostmetrics:
    collection_interval: ${env:TURBALANCE_OTEL_HOST_INTERVAL}
    root_path: ${env:TURBALANCE_OTEL_HOST_ROOT}
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}
      paging: {}
      processes: {}
  prometheus:
    config:
      scrape_configs:
        - job_name: node-exporter
          scrape_interval: 15s
          static_configs:
            - targets: ["127.0.0.1:9100"]
        - job_name: cadvisor
          scrape_interval: 15s
          static_configs:
            - targets: ["127.0.0.1:8088"]
        - job_name: dcgm-exporter
          scrape_interval: 15s
          static_configs:
            - targets: ["127.0.0.1:9400"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  resource/fleet:
    attributes:
      - key: service.name
        value: turbalance-bare-metal-agent
        action: upsert
      - key: host.id
        value: ${env:TURBALANCE_HOST_ID}
        action: upsert
  batch:
    timeout: 5s

exporters:
  prometheus:
    endpoint: 0.0.0.0:9464
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    metrics:
      receivers: [hostmetrics, prometheus]
      processors: [memory_limiter, resource/fleet, batch]
      exporters: [prometheus, debug]
