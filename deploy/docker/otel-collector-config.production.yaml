extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  file_storage/production:
    directory: /var/lib/otelcol/file_storage
    timeout: 10s
    fsync: true

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: turbalance-collector-gateway
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: ["collector-gateway:8801"]
        - job_name: turbalance-api-server
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: ["api-server:8080"]
        - job_name: turbalance-duckdb-query-service
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: ["duckdb-query-service:8802"]
        - job_name: turbalance-discovery-api
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: ["discovery-api:8803"]
        - job_name: turbalance-queue-gateway
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: ["queue-gateway:8804"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  batch:
    timeout: 5s

exporters:
  otlphttp/backend:
    endpoint: ${env:TURBALANCE_OTEL_BACKEND_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:TURBALANCE_OTEL_BACKEND_AUTHORIZATION}
    sending_queue:
      storage: file_storage/production
      queue_size: 2000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 60s
      max_elapsed_time: 0
  prometheus:
    endpoint: 0.0.0.0:9464

service:
  extensions: [health_check, file_storage/production]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/backend]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus, otlphttp/backend]
