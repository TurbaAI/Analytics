extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  file_storage/fleet:
    directory: ${env:TURBALANCE_OTEL_FILE_STORAGE_DIR}
    timeout: 10s
    fsync: true

receivers:
  hostmetrics:
    collection_interval: ${env:TURBALANCE_OTEL_HOST_INTERVAL}
    root_path: ${env:TURBALANCE_OTEL_HOST_ROOT}
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}
      paging: {}
      processes: {}
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: ${env:TURBALANCE_OTEL_DOCKER_INTERVAL}
    timeout: 5s
  prometheus:
    config:
      scrape_configs:
        - job_name: node-exporter
          scrape_interval: 15s
          static_configs:
            - targets: ["127.0.0.1:9100"]
        - job_name: cadvisor
          scrape_interval: 15s
          static_configs:
            - targets: ["127.0.0.1:8088"]
        - job_name: dcgm-exporter
          scrape_interval: 15s
          static_configs:
            - targets: ["127.0.0.1:9400"]
        - job_name: gb100-app-collector
          scrape_interval: 15s
          static_configs:
            - targets: ["127.0.0.1:9500"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  resource/fleet:
    attributes:
      - key: service.name
        value: turbalance-bare-metal-agent
        action: upsert
      - key: deployment.environment
        value: ${env:TURBALANCE_DEPLOYMENT_ENVIRONMENT}
        action: upsert
      - key: host.id
        value: ${env:TURBALANCE_HOST_ID}
        action: upsert
  batch:
    timeout: 5s
    send_batch_size: 2048
    send_batch_max_size: 8192

exporters:
  prometheus:
    endpoint: 0.0.0.0:9464
  otlphttp/backend:
    endpoint: ${env:TURBALANCE_OTEL_BACKEND_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:TURBALANCE_OTEL_BACKEND_AUTHORIZATION}
    sending_queue:
      storage: file_storage/fleet
      queue_size: 2000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 60s
      max_elapsed_time: 0

service:
  extensions: [health_check, file_storage/fleet]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    metrics:
      receivers: [hostmetrics, docker_stats, prometheus]
      processors: [memory_limiter, resource/fleet, batch]
      exporters: [prometheus, otlphttp/backend]
