name: Sandbox Go-Live

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Burn-in iterations"
        required: true
        default: "2"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "ops/pilot-provider.sandbox.json"
      - "ops/source-contracts.sandbox.json"
      - "scripts/build-publish-ingestion-image.js"
      - "scripts/run-provider-go-live-gates.js"
      - "scripts/run-sandbox-go-live.js"
      - "scripts/run-sandbox-source-gateway.js"
      - "server/**"
      - "tests/sandbox-go-live.test.js"
      - ".github/workflows/sandbox-go-live.yml"

jobs:
  sandbox-go-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Run sandbox go-live gate
        run: |
          ITERATIONS="${{ inputs.iterations }}"
          if [ -z "$ITERATIONS" ]; then
            ITERATIONS="2"
          fi
          node scripts/run-sandbox-go-live.js \
            --iterations "$ITERATIONS" \
            --out-dir build/provider-go-live-sandbox-ci

      - name: Upload sandbox go-live artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: turbalance-sandbox-go-live
          path: build/provider-go-live-sandbox-ci/
