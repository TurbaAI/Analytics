services:
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.3-4.8.2-ubuntu22.04
    container_name: gb100-dcgm-exporter
    restart: unless-stopped
    privileged: true
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      DCGM_EXPORTER_INTERVAL: "${DCGM_EXPORTER_INTERVAL:-1000}"
      DCGM_REMOTE_HOSTENGINE_INFO: "${DCGM_REMOTE_HOSTENGINE_INFO:-}"
    ports:
      - "9400:9400"
    volumes:
      - ../../metrics/gb100-dcgm-fields.csv:/etc/dcgm-exporter/gb100-dcgm-fields.csv:ro
    command:
      - /bin/sh
      - -lc
      - |
        # Default interval is 1000 ms. Very aggressive polling can add host and driver overhead.
        ARGS="-f /etc/dcgm-exporter/gb100-dcgm-fields.csv -c $${DCGM_EXPORTER_INTERVAL:-1000}"
        if [ -n "$${DCGM_REMOTE_HOSTENGINE_INFO:-}" ]; then
          ARGS="$${ARGS} -r $${DCGM_REMOTE_HOSTENGINE_INFO}"
        fi
        exec /usr/bin/dcgm-exporter $${ARGS}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  gb100-app-collector:
    image: python:3.12-slim
    container_name: gb100-app-collector
    restart: unless-stopped
    ports:
      - "9500:9500"
    environment:
      ENABLE_NVML_COLLECTOR: "${ENABLE_NVML_COLLECTOR:-false}"
    volumes:
      - ../../collectors:/opt/gb100/collectors:ro
      - ../../metrics:/opt/gb100/metrics:ro
    command:
      - python
      - /opt/gb100/collectors/app_telemetry_exporter.py
      - --listen
      - "0.0.0.0"
      - --port
      - "9500"
      - --capabilities
      - /opt/gb100/metrics/gb100-metric-capabilities.json

  prometheus:
    image: prom/prometheus:v2.53.4
    container_name: gb100-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../prometheus/gb100-recording-rules.yml:/etc/prometheus/rules/gb100-recording-rules.yml:ro
      - ../../alerts/gb100-alerts.yml:/etc/prometheus/alerts/gb100-alerts.yml:ro
    depends_on:
      - dcgm-exporter
      - gb100-app-collector

  grafana:
    image: grafana/grafana:11.5.2
    container_name: gb100-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../../grafana:/var/lib/grafana/dashboards/gb100:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
