apiVersion: v1
kind: Namespace
metadata:
  name: turbalance-observability
  labels:
    app.kubernetes.io/name: turbalance-observability
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: dcgm-exporter
    app.kubernetes.io/part-of: turbalance-spark1-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcgm-exporter
        app.kubernetes.io/part-of: turbalance-spark1-demo
    spec:
      automountServiceAccountToken: false
      runtimeClassName: nvidia
      tolerations:
        - operator: Exists
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.3-4.8.2-distroless
          imagePullPolicy: IfNotPresent
          env:
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: metrics
              containerPort: 9400
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add: ["SYS_ADMIN"]
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 2Gi
          volumeMounts:
            - name: pod-gpu-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
      volumes:
        - name: pod-gpu-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: dcgm-exporter
    app.kubernetes.io/part-of: turbalance-spark1-demo
spec:
  selector:
    app.kubernetes.io/name: dcgm-exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: turbalance-spark1-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    scrape_configs:
      - job_name: dcgm-exporter
        static_configs:
          - targets:
              - dcgm-exporter.turbalance-observability.svc.cluster.local:9400
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: turbalance-spark1-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: turbalance-spark1-demo
    spec:
      containers:
        - name: prometheus
          image: quay.io/prometheus/prometheus:v3.7.3
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: turbalance-spark1-demo
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: turbalance-spark1-demo
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: SPARK1 Prometheus
        uid: spark1-prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.turbalance-observability.svc.cluster.local:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: turbalance-spark1-demo
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: SPARK1
        orgId: 1
        folder: SPARK1
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-spark1-dashboard
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: turbalance-spark1-demo
data:
  spark1-dcgm.json: |
    {
      "uid": "spark1-dcgm",
      "title": "SPARK1 DCGM GPU Demo",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "timezone": "browser",
      "tags": ["turbalance", "spark1", "dcgm"],
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "GPU Utilization",
          "datasource": { "type": "prometheus", "uid": "spark1-prometheus" },
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 6 },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_GPU_UTIL)",
              "legendFormat": "GPU util",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 40 },
                  { "color": "green", "value": 75 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "GPU Power",
          "datasource": { "type": "prometheus", "uid": "spark1-prometheus" },
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 6 },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_POWER_USAGE)",
              "legendFormat": "power",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 20 },
                  { "color": "orange", "value": 80 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "GPU Temperature",
          "datasource": { "type": "prometheus", "uid": "spark1-prometheus" },
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 6 },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_GPU_TEMP)",
              "legendFormat": "temperature",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 65 },
                  { "color": "red", "value": 85 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "GPU Utilization And Power",
          "datasource": { "type": "prometheus", "uid": "spark1-prometheus" },
          "gridPos": { "x": 0, "y": 6, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "util {{pod}}",
              "refId": "A"
            },
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "power {{pod}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "fillOpacity": 12,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["lastNotNull"]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          }
        },
        {
          "id": 5,
          "type": "table",
          "title": "Active DCGM Series",
          "datasource": { "type": "prometheus", "uid": "spark1-prometheus" },
          "gridPos": { "x": 0, "y": 14, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "showHeader": true
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: turbalance-spark1-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: turbalance-spark1-demo
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "false"
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/spark1-dcgm.json
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard
          configMap:
            name: grafana-spark1-dashboard
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: turbalance-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: turbalance-spark1-demo
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
