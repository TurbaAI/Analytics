apiVersion: batch/v1
kind: CronJob
metadata:
  name: turbalance-retention
  labels:
    app.kubernetes.io/name: turbalance-ingestion
    app.kubernetes.io/component: retention
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: turbalance-ingestion
            app.kubernetes.io/component: retention
        spec:
          restartPolicy: Never
          containers:
            - name: retention
              image: ghcr.io/your-org/turbalance-ingestion:latest
              imagePullPolicy: IfNotPresent
              command: ["node", "scripts/run-retention-job.js", "--json"]
              envFrom:
                - configMapRef:
                    name: turbalance-ingestion-config
                - secretRef:
                    name: turbalance-ingestion-secrets
              volumeMounts:
                - name: turbalance-data
                  mountPath: /app/.turbalance-data
          volumes:
            - name: turbalance-data
              persistentVolumeClaim:
                claimName: turbalance-ingestion-data
