apiVersion: v1
kind: Namespace
metadata:
  name: turbalance-demo
  labels:
    app.kubernetes.io/name: turbalance-demo
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spark1-gpu-dcgm-load
  namespace: turbalance-demo
  labels:
    app.kubernetes.io/name: spark1-gpu-dcgm-load
    turba.ai/run-id: spark1-k8s-demo-001
    turba.ai/demo: spark1-kubernetes
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark1-gpu-dcgm-load
        turba.ai/run-id: spark1-k8s-demo-001
        turba.ai/demo: spark1-kubernetes
    spec:
      restartPolicy: Never
      runtimeClassName: nvidia
      containers:
        - name: cuda-spin
          image: ubuntu:24.04
          imagePullPolicy: IfNotPresent
          command: ["/work/cuda-spin", "180"]
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: cuda-spin
              mountPath: /work/cuda-spin
              readOnly: true
      volumes:
        - name: cuda-spin
          hostPath:
            path: /home/user/Analytics/build/demo/cuda-spin
            type: File
