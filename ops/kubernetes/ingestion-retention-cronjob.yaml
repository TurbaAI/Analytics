apiVersion: batch/v1
kind: CronJob
metadata:
  name: turbalance-retention
  labels:
    app.kubernetes.io/name: turbalance-ingestion
    app.kubernetes.io/component: retention
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: turbalance-ingestion
            app.kubernetes.io/component: retention
        spec:
          restartPolicy: Never
          containers:
            - name: retention
              image: ghcr.io/your-org/turbalance-ingestion:latest
              imagePullPolicy: IfNotPresent
              command: ["node", "scripts/run-retention-job.js", "--json"]
              envFrom:
                - configMapRef:
                    name: turbalance-ingestion-config
              env:
                - name: TURBALANCE_TENANT_TOKENS_FILE
                  value: /var/run/turbalance-secrets/tenant-tokens
                - name: TURBALANCE_UPLOAD_SECRET_FILE
                  value: /var/run/turbalance-secrets/upload-secret
                - name: TURBALANCE_JWT_SECRET_FILE
                  value: /var/run/turbalance-secrets/jwt-secret
              volumeMounts:
                - name: turbalance-data
                  mountPath: /app/.turbalance-data
                - name: turbalance-objects
                  mountPath: /app/.turbalance-objects
                - name: turbalance-control
                  mountPath: /app/.turbalance-control
                - name: secrets
                  mountPath: /var/run/turbalance-secrets
                  readOnly: true
          volumes:
            - name: turbalance-data
              persistentVolumeClaim:
                claimName: turbalance-ingestion-data
            - name: turbalance-objects
              persistentVolumeClaim:
                claimName: turbalance-ingestion-objects
            - name: turbalance-control
              persistentVolumeClaim:
                claimName: turbalance-ingestion-control
            - name: secrets
              secret:
                secretName: turbalance-ingestion-secrets
