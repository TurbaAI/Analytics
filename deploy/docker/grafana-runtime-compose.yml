name: turbalance-grafana-runtime

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: turbalance-prometheus-runtime
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./grafana-runtime/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - turbalance_prometheus_runtime:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.listen-address=0.0.0.0:9091
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:latest
    container_name: turbalance-grafana-runtime
    restart: unless-stopped
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL: "${TURBALANCE_GRAFANA_PUBLIC_URL:-http://localhost:3001}"
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/turbalance-fleet-runtime.json
    volumes:
      - ./grafana-runtime/provisioning:/etc/grafana/provisioning:ro
      - ./grafana-runtime/dashboards:/var/lib/grafana/dashboards:ro
      - turbalance_grafana_runtime:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  turbalance_prometheus_runtime:
  turbalance_grafana_runtime:
