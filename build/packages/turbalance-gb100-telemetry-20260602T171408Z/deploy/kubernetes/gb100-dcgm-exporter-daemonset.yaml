apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gb100-dcgm-exporter
  namespace: gb100-telemetry
  labels:
    app.kubernetes.io/name: gb100-dcgm-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gb100-dcgm-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gb100-dcgm-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.3-4.8.2-ubuntu22.04
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
            - name: DCGM_EXPORTER_INTERVAL
              value: "1000"
            - name: DCGM_REMOTE_HOSTENGINE_INFO
              valueFrom:
                configMapKeyRef:
                  name: gb100-dcgm-exporter-config
                  key: remoteHostEngine
                  optional: true
          command:
            - /bin/sh
            - -lc
            - |
              # Default interval is 1000 ms. Very aggressive polling can add overhead on busy GPU nodes.
              ARGS="-f /etc/dcgm-exporter/gb100-dcgm-fields.csv -c ${DCGM_EXPORTER_INTERVAL:-1000}"
              if [ -n "${DCGM_REMOTE_HOSTENGINE_INFO:-}" ]; then
                ARGS="${ARGS} -r ${DCGM_REMOTE_HOSTENGINE_INFO}"
              fi
              exec /usr/bin/dcgm-exporter ${ARGS}
          ports:
            - name: metrics
              containerPort: 9400
          volumeMounts:
            - name: collectors
              mountPath: /etc/dcgm-exporter
              readOnly: true
      volumes:
        - name: collectors
          configMap:
            name: gb100-dcgm-fields
---
apiVersion: v1
kind: Service
metadata:
  name: gb100-dcgm-exporter
  namespace: gb100-telemetry
  labels:
    app.kubernetes.io/name: gb100-dcgm-exporter
spec:
  selector:
    app.kubernetes.io/name: gb100-dcgm-exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gb100-dcgm-exporter-config
  namespace: gb100-telemetry
data:
  remoteHostEngine: ""
