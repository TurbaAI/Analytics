apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: turbalance-otel-backend
  namespace: turbalance-lakehouse
  labels: { app.kubernetes.io/part-of: turbalance-lakehouse }
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: turbalance-provider-secrets
  target:
    name: turbalance-otel-backend
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: TURBALANCE_OTEL_BACKEND_OTLP_ENDPOINT
      remoteRef:
        key: lakehouse/otel-backend
        property: otlp-endpoint
    - secretKey: TURBALANCE_OTEL_BACKEND_AUTHORIZATION
      remoteRef:
        key: lakehouse/otel-backend
        property: authorization
