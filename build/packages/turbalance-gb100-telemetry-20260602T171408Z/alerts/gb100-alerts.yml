groups:
  - name: gb100.health.alerts
    rules:
      - alert: GB100XidErrorObserved
        expr: gpu_xid_error_code > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: XID error observed on GPU
          description: DCGM reported a non-zero XID error code. Capture the support report and inspect dmesg and driver logs.
          suggested_remediation: Drain the node if errors persist, collect nvidia-bug-report and DCGM diagnostics, then escalate with GPU UUID and XID code.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-health-ras
      - alert: GB100DoubleBitEccErrorObserved
        expr: increase(gpu_ecc_dbe_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Double-bit ECC error observed
          description: Double-bit ECC errors increased on a GPU and can indicate data corruption risk.
          suggested_remediation: Stop new workload placement, preserve logs, run DCGM diagnostics, and follow hardware replacement policy.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-health-ras
      - alert: GB100RetiredPagesIncreasing
        expr: increase(gpu_retired_pages_total[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Retired GPU pages increased
          description: Page retirement count increased. This can be an early reliability signal.
          suggested_remediation: Watch for repeat growth, schedule diagnostics, and compare against fleet baseline for this GPU model.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-health-ras
      - alert: GB100RowRemapFailure
        expr: DCGM_FI_DEV_ROW_REMAP_FAILURE > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: GPU row remap failure detected
          description: DCGM indicates row remapping failed or exhausted safe remap capacity.
          suggested_remediation: Drain the GPU, run DCGM diagnostics, and open a hardware service case.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-health-ras
      - alert: GB100TemperatureNearSlowdown
        expr: gpu_temperature_celsius >= (DCGM_FI_DEV_SLOWDOWN_TEMP - 5)
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: GPU temperature near slowdown threshold
          description: GPU core temperature is within 5C of the slowdown threshold.
          suggested_remediation: Check chassis airflow, fan or liquid cooling status, rack inlet temperature, and power caps.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-power-thermal
      - alert: GB100MemoryTemperatureNearMax
        expr: gpu_memory_temperature_celsius >= (DCGM_FI_DEV_MEM_MAX_OP_TEMP - 5)
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: GPU memory temperature near maximum operating threshold
          description: HBM temperature is within 5C of the maximum operating threshold.
          suggested_remediation: Check cooling loop health, node airflow, workload power profile, and adjacent accelerator temperatures.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-power-thermal
      - alert: GB100PowerViolationIncreasing
        expr: increase(DCGM_FI_DEV_POWER_VIOLATION[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: GPU power violation increasing
          description: DCGM power violation counter increased.
          suggested_remediation: Check enforced power limits, application power spikes, and node power budget.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-power-thermal
      - alert: GB100ThermalViolationIncreasing
        expr: increase(DCGM_FI_DEV_THERMAL_VIOLATION[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: GPU thermal violation increasing
          description: DCGM thermal violation counter increased.
          suggested_remediation: Inspect cooling, thermal paste or cold plate seating, fan curves, and rack inlet conditions.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-power-thermal
      - alert: GB100ReliabilityViolationIncreasing
        expr: increase(DCGM_FI_DEV_RELIABILITY_VIOLATION[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: GPU reliability violation increasing
          description: DCGM reliability violation counter increased.
          suggested_remediation: Run diagnostics and correlate with ECC, XID, thermal, and power events.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-health-ras
      - alert: GB100NvlinkErrorsIncreasing
        expr: increase(gpu_nvlink_errors_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: NVLink errors increasing
          description: One or more NVLink receive error counters increased.
          suggested_remediation: Check topology, link state, fabric manager status, and reseat or service affected links if persistent.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-interconnect
      - alert: GB100NvlinkLinkDown
        expr: DCGM_FI_DEV_NVLINK_GET_STATE == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: NVLink link down
          description: DCGM reports an NVLink link in the down state.
          suggested_remediation: Drain dependent multi-GPU workloads, inspect fabric manager, and run link diagnostics.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-interconnect
      - alert: GB100C2cLinkDown
        expr: DCGM_FI_DEV_C2C_LINK_STATUS == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: C2C link down
          description: A dual-die C2C link reports down or unavailable status.
          suggested_remediation: Drain the GPU and run hardware diagnostics before returning it to multi-die workloads.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-interconnect
      - alert: GB100FabricManagerUnhealthy
        expr: DCGM_FI_DEV_FABRIC_MANAGER_STATUS != 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Fabric Manager unhealthy
          description: DCGM reports Fabric Manager status as unhealthy or non-default.
          suggested_remediation: Restart or inspect Fabric Manager, validate NVSwitch topology, and keep multi-node jobs from scheduling until healthy.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-interconnect
      - alert: GB100FabricHealthMaskNonZero
        expr: DCGM_FI_DEV_FABRIC_HEALTH_MASK != 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Fabric health mask non-zero
          description: Fabric health bitmask is non-zero.
          suggested_remediation: Decode the mask with NVIDIA tooling, check NVSwitch and Fabric Manager logs, and drain affected nodes if needed.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-interconnect
      - alert: GB100PcieReplayCounterHigh
        expr: increase(DCGM_FI_DEV_PCIE_REPLAY_COUNTER[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: PCIe replay counter increasing quickly
          description: PCIe replay counter increased rapidly over 5 minutes.
          suggested_remediation: Inspect PCIe link generation and width, riser or cable seating, and host error logs.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-interconnect
      - alert: GB100MemoryAboveThreshold
        expr: gpu_memory_used_ratio > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: GPU memory above threshold
          description: GPU framebuffer utilization is above 90 percent for at least 10 minutes.
          suggested_remediation: Check batch size, KV-cache pressure, model placement, and memory fragmentation.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-memory
      - alert: GB100LowSmOccupancyHighMemory
        expr: gpu_sm_occupancy_ratio < 0.25 and gpu_memory_used_ratio > 0.80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Low SM occupancy while memory is high
          description: The GPU is memory-heavy but not keeping SMs occupied.
          suggested_remediation: Inspect batch shaping, sequence length, KV cache, dataloader stalls, and kernel mix.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-compute
      - alert: GB100TensorPipeLowForLlmWorkload
        expr: gpu_tensor_pipe_active_ratio < 0.15 and on(namespace,pod,container) gb100_app_llm_workload_info == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Tensor pipe low for tagged LLM workload
          description: App instrumentation marks the workload as LLM training or inference but Tensor pipe activity is low.
          suggested_remediation: Verify precision mode, kernel selection, batch size, token throughput, and fallback paths.
          dashboard: ${GRAFANA_BASE_URL}/d/gb100-tenant-workloads
